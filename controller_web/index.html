<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GAM Controller</title>
  <style>
    :root { color-scheme: dark; --bg: #0f1115; --panel: #1a1d24; --fg: #e8eaed; --muted: #8b919a; --accent: #3b82f6; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif; }
    #bar { display: flex; gap: 8px; align-items: center; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid #2a2f3a; flex-wrap: wrap; }
    #bar input { flex: 1; min-width: 140px; height: 32px; border-radius: 6px; border: 1px solid #2a2f3a; background: #0f1115; color: var(--fg); padding: 0 10px; }
    #bar button { height: 32px; padding: 0 12px; border-radius: 6px; border: 0; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
    #bar button.off { background: #334155; }
    #status { font-size: 12px; color: var(--muted); }
    #stage { position: relative; flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; background: #000; touch-action: none; }
    canvas { max-width: 100%; max-height: 100%; background: #000; cursor: crosshair; }
    body { display: flex; flex-direction: column; }
    #hint { font-size: 11px; color: var(--muted); padding: 6px 12px; }
  </style>
</head>
<body>
  <div id="bar">
    <input id="host" value="ws://127.0.0.1:9997" spellcheck="false" />
    <button id="btn">Connect</button>
    <span id="status">Disconnected</span>
  </div>
  <div id="stage"><canvas id="cv" width="640" height="360"></canvas></div>
  <div id="hint">Web controller · H.264 via bridge WebSocket · actions → agent TCP :9999 · desktop=foreground / window=background (server-enforced)</div>
  <script type="module" src="./app.js"></script>
</body>
</html>
